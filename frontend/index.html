<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Wallet</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Plus+Jakarta+Sans:wght@400;500;600;700&family=DM+Sans:ital,wght@0,400;0,500;1,400&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet" />
    <style>@import url('https://api.fontshare.com/v2/css?f[]=clash-display@400,500,600,700&display=swap');</style>
    <!-- Anti-FOUC: apply saved theme before first paint -->
    <script>
      (function () {
        var mode = localStorage.getItem('theme-mode') || 'light';
        var hue = parseInt(localStorage.getItem('theme-hue'), 10);
        if (!Number.isFinite(hue)) hue = 150;
        var r = document.documentElement;
        r.dataset.theme = mode;
        if (mode === 'dark') {
          r.style.setProperty('--accent',        'oklch(74% 0.17 ' + hue + ')');
          r.style.setProperty('--accent-ink',    'oklch(88% 0.14 ' + hue + ')');
          r.style.setProperty('--accent-soft',   'oklch(26% 0.06 ' + hue + ')');
          r.style.setProperty('--accent-soft-2', 'oklch(34% 0.09 ' + hue + ')');
          r.style.setProperty('--focus-ring',    '0 0 0 3px oklch(74% 0.17 ' + hue + ' / .3)');
        } else {
          r.style.setProperty('--accent',        'oklch(58% 0.14 ' + hue + ')');
          r.style.setProperty('--accent-ink',    'oklch(36% 0.11 ' + hue + ')');
          r.style.setProperty('--accent-soft',   'oklch(94% 0.04 ' + hue + ')');
          r.style.setProperty('--accent-soft-2', 'oklch(88% 0.08 ' + hue + ')');
          r.style.setProperty('--focus-ring',    '0 0 0 3px oklch(58% 0.14 ' + hue + ' / .22)');
        }
        r.style.setProperty('--color-accent', 'var(--accent)');
        r.style.setProperty('--color-accent-light', 'var(--accent-soft-2)');
      })();
    </script>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
