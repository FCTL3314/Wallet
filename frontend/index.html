<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Wallet</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Plus+Jakarta+Sans:wght@400;500;600;700&family=DM+Sans:ital,wght@0,400;0,500;1,400&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet" />
    <style>@import url('https://api.fontshare.com/v2/css?f[]=clash-display@400,500,600,700&display=swap');</style>
    <!-- Anti-FOUC: apply saved theme before first paint -->
    <script>
      (function () {
        var accentMap = {
          blue:   { main: '#2272cc', light: '#4298f5', rgb: '34, 114, 204' },
          violet: { main: '#7c3aed', light: '#a78bfa', rgb: '124, 58, 237' },
          teal:   { main: '#0e9488', light: '#2dd4bf', rgb: '14, 148, 136' },
          green:  { main: '#16a34a', light: '#4ade80', rgb: '22, 163, 74' },
          orange: { main: '#ea580c', light: '#fb923c', rgb: '234, 88, 12' },
          rose:   { main: '#e11d48', light: '#fb7185', rgb: '225, 29, 72' },
        };
        var mode = localStorage.getItem('theme-mode') || 'light';
        var key  = localStorage.getItem('theme-accent') || 'blue';
        var p = accentMap[key] || accentMap.blue;
        var r = document.documentElement;
        r.dataset.theme = mode;
        r.style.setProperty('--color-accent', p.main);
        r.style.setProperty('--color-accent-light', p.light);
        r.style.setProperty('--color-accent-rgb', p.rgb);
        r.style.setProperty('--shadow-btn-accent', '0 4px 24px rgba(' + p.rgb + ', 0.30)');
      })();
    </script>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
