services:
  db:
    image: postgres:16.13-alpine
    environment:
      POSTGRES_USER: wallet
      POSTGRES_PASSWORD: wallet
      POSTGRES_DB: wallet
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U wallet"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:7.4.8-alpine
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  kafka:
    image: apache/kafka:4.2.0
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      CLUSTER_ID: fvjM13kgRhmuvNpbbNKuWg
    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-topics.sh --bootstrap-server localhost:9092 --list"]
      interval: 10s
      timeout: 10s
      retries: 10
      start_period: 30s
    restart: unless-stopped

  backend:
    image: ghcr.io/${OWNER}/wallet-backend:${IMAGE_TAG:-latest}
    expose:
      - "8000"
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql+asyncpg://wallet:wallet@db:5432/wallet}
      PYTHONPATH: /app
      SECRET_KEY: ${SECRET_KEY}
      GITHUB_CLIENT_ID: ${GITHUB_CLIENT_ID:-}
      GITHUB_CLIENT_SECRET: ${GITHUB_CLIENT_SECRET:-}
      GITHUB_REDIRECT_URI: ${GITHUB_REDIRECT_URI:-}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-}
      GOOGLE_REDIRECT_URI: ${GOOGLE_REDIRECT_URI:-}
      FRONTEND_URL: ${FRONTEND_URL:-}
      CORS_ORIGINS: ${CORS_ORIGINS:-}
      REDIS_URL: redis://redis:6379/0
      KAFKA_URL: kafka:9092
      REPORTS_DIR: /reports
      EXCHANGERATE_API_KEY: ${EXCHANGERATE_API_KEY:-}
      COINGECKO_API_KEY: ${COINGECKO_API_KEY:-}
    volumes:
      - reports_data:/reports
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/health')"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 40s
    restart: unless-stopped

  celery:
    image: ghcr.io/${OWNER}/wallet-backend:${IMAGE_TAG:-latest}
    command: uv run celery -A app.celery_app:celery_app worker --beat -Q catalog,rates -l info
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql+asyncpg://wallet:wallet@db:5432/wallet}
      PYTHONPATH: /app
      SECRET_KEY: ${SECRET_KEY}
      REDIS_URL: redis://redis:6379/0
      EXCHANGERATE_API_KEY: ${EXCHANGERATE_API_KEY:-}
      COINGECKO_API_KEY: ${COINGECKO_API_KEY:-}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "uv", "run", "celery", "-A", "app.celery_app:celery_app", "inspect", "ping", "-d", "celery@$$HOSTNAME", "--timeout", "5"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    restart: unless-stopped


  report-service:
    image: ghcr.io/${OWNER}/wallet-report-service:${IMAGE_TAG:-latest}
    expose:
      - "8001"
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql+asyncpg://wallet:wallet@db:5432/wallet}
      KAFKA_URL: kafka:9092
      REPORTS_DIR: /reports
    volumes:
      - reports_data:/reports
    depends_on:
      db:
        condition: service_healthy
      kafka:
        condition: service_healthy
    restart: unless-stopped

  frontend:
    image: ghcr.io/${OWNER}/wallet-frontend:${IMAGE_TAG:-latest}
    ports:
      - "3000:80"
    depends_on:
      - backend

  backup:
    image: ghcr.io/${OWNER}/wallet-backup:${IMAGE_TAG:-latest}
    environment:
      POSTGRES_HOST: db
      POSTGRES_PORT: "5432"
      POSTGRES_USER: wallet
      POSTGRES_PASSWORD: wallet
      POSTGRES_DB: wallet
      RCLONE_REMOTE: ${RCLONE_REMOTE:-gdrive:wallet-backups}
      BACKUP_SCHEDULE: ${BACKUP_SCHEDULE:-0 2 * * *}
      BACKUP_RETAIN_DAYS: ${BACKUP_RETAIN_DAYS:-30}
    volumes:
      - ${RCLONE_CONFIG_PATH}:/rclone/rclone.conf:ro
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

volumes:
  pgdata:
  reports_data:
