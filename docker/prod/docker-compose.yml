services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: wallet
      POSTGRES_PASSWORD: wallet
      POSTGRES_DB: wallet
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U wallet"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    image: ${BACKEND_IMAGE}:${IMAGE_TAG:-latest}
    expose:
      - "8000"
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql+asyncpg://wallet:wallet@db:5432/wallet}
      PYTHONPATH: /app
      SECRET_KEY: ${SECRET_KEY}
      GITHUB_CLIENT_ID: ${GITHUB_CLIENT_ID:-}
      GITHUB_CLIENT_SECRET: ${GITHUB_CLIENT_SECRET:-}
      GITHUB_REDIRECT_URI: ${GITHUB_REDIRECT_URI:-}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-}
      GOOGLE_REDIRECT_URI: ${GOOGLE_REDIRECT_URI:-}
      FRONTEND_URL: ${FRONTEND_URL:-}
      CORS_ORIGINS: ${CORS_ORIGINS:-}
    depends_on:
      db:
        condition: service_healthy

  frontend:
    image: ${FRONTEND_IMAGE}:${IMAGE_TAG:-latest}
    ports:
      - "3000:80"
    depends_on:
      - backend

  backup:
    image: ${BACKUP_IMAGE}:${IMAGE_TAG:-latest}
    environment:
      POSTGRES_HOST: db
      POSTGRES_PORT: "5432"
      POSTGRES_USER: wallet
      POSTGRES_PASSWORD: wallet
      POSTGRES_DB: wallet
      RCLONE_REMOTE: ${RCLONE_REMOTE:-gdrive:wallet-backups}
      BACKUP_SCHEDULE: ${BACKUP_SCHEDULE:-0 2 * * *}
      BACKUP_RETAIN_DAYS: ${BACKUP_RETAIN_DAYS:-30}
    volumes:
      - ${RCLONE_CONFIG_PATH}:/rclone/rclone.conf:ro
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

volumes:
  pgdata:
