repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.9.10
    hooks:
      - id: ruff
        args: [--fix]
        files: ^backend/
      - id: ruff-format
        files: ^backend/

  - repo: local
    hooks:
      - id: frontend-type-check
        name: Frontend type check
        language: system
        entry: bash -c 'cd frontend && npm run type-check'
        pass_filenames: false
        files: ^frontend/.*\.(ts|vue)$

      - id: backend-tests
        name: Backend tests
        language: system
        entry: make test
        pass_filenames: false
        files: ^backend/
