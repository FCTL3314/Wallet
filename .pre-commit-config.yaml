repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.9.10
    hooks:
      - id: ruff
        args: [--fix]
        files: ^backend/
      - id: ruff-format
        files: ^backend/

  - repo: local
    hooks:
      - id: backend-tests
        name: Backend tests
        language: system
        entry: docker exec dev-backend-1 uv run pytest . -x -q --tb=short
        pass_filenames: false
        files: ^backend/
