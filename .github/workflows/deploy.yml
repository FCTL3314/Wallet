name: Deploy

on:
  workflow_run:
    workflows: [CI]
    branches: [master]
    types: [completed]
  workflow_dispatch:

jobs:
  build-push:
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    name: Build & Push to GHCR
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      owner: ${{ steps.owner.outputs.value }}
    steps:
      - uses: actions/checkout@v4

      - name: Set owner (lowercase)
        id: owner
        run: echo "value=$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')" >> $GITHUB_OUTPUT

      - uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push all images
        uses: docker/bake-action@v6
        with:
          push: true
        env:
          OWNER: ${{ steps.owner.outputs.value }}
          TAG: ${{ github.sha }}

  deploy:
    name: Deploy to Server
    runs-on: ubuntu-latest
    needs: build-push
    steps:
      - uses: actions/checkout@v4

      - name: Encode compose file
        id: compose
        run: echo "content=$(base64 -w 0 docker/prod/docker-compose.yml)" >> $GITHUB_OUTPUT

      - name: Deploy
        uses: appleboy/ssh-action@v1.0.3
        env:
          OWNER: ${{ needs.build-push.outputs.owner }}
          IMAGE_TAG: ${{ github.sha }}
          GHCR_TOKEN: ${{ secrets.GHCR_TOKEN }}
          GH_ACTOR: ${{ github.actor }}
          RCLONE_CONFIG_PATH: ${{ secrets.RCLONE_CONFIG_PATH }}
          COMPOSE_B64: ${{ steps.compose.outputs.content }}
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          envs: OWNER,IMAGE_TAG,GHCR_TOKEN,GH_ACTOR,RCLONE_CONFIG_PATH,COMPOSE_B64
          script: |
            mkdir -p /opt/wallet
            echo "$COMPOSE_B64" | base64 -d > /opt/wallet/docker-compose.yml
            echo "$GHCR_TOKEN" | docker login ghcr.io -u "$GH_ACTOR" --password-stdin
            cd /opt/wallet
            OWNER=$OWNER IMAGE_TAG=$IMAGE_TAG RCLONE_CONFIG_PATH=$RCLONE_CONFIG_PATH \
              docker compose -f docker-compose.yml pull
            OWNER=$OWNER IMAGE_TAG=$IMAGE_TAG RCLONE_CONFIG_PATH=$RCLONE_CONFIG_PATH \
              docker compose -f docker-compose.yml up -d --remove-orphans
            docker image prune -f